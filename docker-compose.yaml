version: "3"
services:
  nginx:
    image: nginx
    container_name: nginx
    restart: always
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 80:80
    networks:
      - my-network
    depends_on:
      - flask_app
  flask_app:
    container_name: flask_app
    volumes:
      - books:/bot/books
    build: .
    command: gunicorn -b 0.0.0.0:8000 -w 1 "wsgi:app"
    restart: always
    ports:
      - 8000:8000
    networks:
      my-network:
    environment:
      - ADMIN_TG_ID=
      - DATABASE_HOST=
      - DATABASE_PASSWORD=
      - DATABASE_PORT=
      - TG_TOKEN=
      - URL=
volumes:
  books: {}
networks:
  my-network:
